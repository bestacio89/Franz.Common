trigger:
  branches:
    include:
      - Develop

pr:
  branches:
    include:
      - Develop

variables:
  buildConfiguration: 'Release'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages

stages:

# =========================
# STAGE 1 - BUILD
# =========================
- stage: Build
  displayName: "Build Stage"
  jobs:
  - job: BuildJob
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - checkout: self
      fetchDepth: '0'

    - task: Cache@2
      displayName: 'Cache NuGet packages'
      inputs:
        key: 'nuget | "$(Agent.OS)" | **/packages.lock.json'
        restoreKeys: |
          nuget | "$(Agent.OS)"
        path: $(NUGET_PACKAGES)

    - task: UseDotNet@2
      displayName: 'Install .NET 10 SDK'
      inputs:
        packageType: 'sdk'
        version: '10.0.x'
        includePreviewVersions: true

    - task: DotNetCoreCLI@2
      displayName: 'Restore'
      inputs:
        command: 'restore'
        projects: '**/*.sln'
        feedsToUse: 'select'

    - task: DotNetCoreCLI@2
      displayName: 'Build'
      inputs:
        command: 'build'
        projects: '**/*.sln'
        arguments: >
          --configuration $(buildConfiguration)
          --no-restore
          -p:MaxCpuCount=2
          /p:UseSharedCompilation=false

    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop

# =========================
# STAGE 2 - TESTS (Unit + Integration)
# =========================
- stage: Tests
  displayName: "Run All Tests"
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: RunTests
    timeoutInMinutes: '90'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - checkout: self

    - task: UseDotNet@2
      displayName: 'Install .NET 10 SDK'
      inputs:
        packageType: 'sdk'
        version: '10.0.x'
        includePreviewVersions: true

    - task: DotNetCoreCLI@2
      displayName: 'Run Unit Tests'
      inputs:
        command: 'test'
        projects: '**/*.sln'
        arguments: >
          --configuration $(buildConfiguration)
          --no-build
          --filter "Category!=Integration"
          --logger trx
        publishTestResults: true

    - task: DotNetCoreCLI@2
      displayName: 'Run Integration Tests'
      inputs:
        command: 'test'
        projects: '**/*.sln'
        arguments: >
          --configuration $(buildConfiguration)
          --no-build
          --filter "Category=Integration"
          --logger trx
        publishTestResults: true