trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-24.04'

variables:
- group: 'Secrets and variables'
- name: buildConfiguration
  value: 'Release'
- name: projectName
  value: 'Franz.Common'
- name: outputDir
  value: '$(Build.ArtifactStagingDirectory)/packages'
- name: azureOrg
  value: 'EntelekheiaSystems'
- name: feedName
  value: 'AjnaTellus'

# ------------------------------------------------------------
# BUILD STAGE (single source of truth)
# ------------------------------------------------------------
stages:

- stage: Build
  displayName: Build
  jobs:
  - job: build
    displayName: Build Solution
    steps:

    - checkout: self
      persistCredentials: true
      fetchDepth: 0

    - task: NuGetAuthenticate@1
      displayName: Authenticate Azure Artifacts

    - task: UseDotNet@2
      displayName: Use .NET SDK 10.x
      inputs:
        packageType: sdk
        version: '10.0.200'

    - script: |
        set -euo pipefail
        dotnet restore
      displayName: Restore

    - script: |
        set -euo pipefail
        dotnet build --configuration $(buildConfiguration) --no-restore
      displayName: Build

    - publish: .
      artifact: drop


# ------------------------------------------------------------
# TEST STAGE (FULL FAN-OUT PARALLEL MATRIX)
# ------------------------------------------------------------
- stage: Tests
  displayName: Tests
  dependsOn: Build
  jobs:

  # ---------------- CORE (FAST FEEDBACK GATE) ----------------
  - job: unit_tests
    displayName: Unit Tests (Fast Gate)
    steps:
    - download: current
      artifact: drop

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - script: |
        set -euo pipefail
        dotnet test Franz.Common.Business.Tests.csproj \
          --configuration $(buildConfiguration) \
          --no-build \
          --logger "trx"
      displayName: Run Unit Tests

  # ---------------- CACHE ----------------
  - job: cache_tests
    displayName: Cache Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: drop

    - script: |
        set -euo pipefail
        dotnet test Franz.Common.Caching.Tests.csproj \
          --configuration $(buildConfiguration) \
          --no-build \
          --logger "trx"
      displayName: Run Cache Tests

  # ---------------- MAPPING ----------------
  - job: mapping_tests
    displayName: Mapping Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: drop

    - script: |
        set -euo pipefail
        dotnet test Franz.Common.Mapping.Tests.csproj \
          --configuration $(buildConfiguration) \
          --no-build \
          --logger "trx"
      displayName: Run Mapping Tests

  # ---------------- MESSAGING CORE ----------------
  - job: messaging_core
    displayName: Messaging Core Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: drop

    - script: |
        set -euo pipefail
        dotnet test Franz.Common.Messaging.Tests.csproj \
          --configuration $(buildConfiguration) \
          --no-build \
          --logger "trx"
      displayName: Run Messaging Core Tests

  # ---------------- KAFKA ----------------
  - job: kafka_tests
    displayName: Kafka Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: drop

    - script: |
        set -euo pipefail
        dotnet test Franz.Common.Messaging.Kafka.Tests.csproj \
          --configuration $(buildConfiguration) \
          --no-build \
          --logger "trx"
      displayName: Run Kafka Tests

  # ---------------- RABBITMQ ----------------
  - job: rabbitmq_tests
    displayName: RabbitMQ Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: drop

    - script: |
        set -euo pipefail
        dotnet test Franz.Common.Messaging.RabbitMQ.Tests.csproj \
          --configuration $(buildConfiguration) \
          --no-build \
          --logger "trx"
      displayName: Run RabbitMQ Tests

  # ---------------- HOSTING (KAFKA) ----------------
  - job: kafka_hosting_tests
    displayName: Kafka Hosting Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: drop

    - script: |
        set -euo pipefail
        dotnet test Franz.Common.Messaging.Hosting.Kafka.Tests.csproj \
          --configuration $(buildConfiguration) \
          --no-build \
          --logger "trx"
      displayName: Run Kafka Hosting Tests

  # ---------------- HOSTING (RABBITMQ) ----------------
  - job: rabbitmq_hosting_tests
    displayName: RabbitMQ Hosting Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: drop

    - script: |
        set -euo pipefail
        dotnet test Franz.Common.Messaging.Hosting.RabbitMQ.Tests.csproj \
          --configuration $(buildConfiguration) \
          --no-build \
          --logger "trx"
      displayName: Run RabbitMQ Hosting Tests

  # ---------------- EF CORE ----------------
  - job: ef_sqlserver
    displayName: EF SQLServer Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: drop

    - script: |
        set -euo pipefail
        dotnet test Franz.Common.EntityFramework.SQLServer.Tests.csproj \
          --configuration $(buildConfiguration) \
          --no-build \
          --logger "trx"
      displayName: Run SQLServer Tests

  - job: ef_postgres
    displayName: EF Postgres Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: drop

    - script: |
        set -euo pipefail
        dotnet test Franz.Common.EntityFramework.Postgres.Tests.csproj \
          --configuration $(buildConfiguration) \
          --no-build \
          --logger "trx"
      displayName: Run Postgres Tests

  - job: ef_oracle
    displayName: EF Oracle Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: drop

    - script: |
        set -euo pipefail
        dotnet test Franz.Common.EntityFramework.Oracle.Tests.csproj \
          --configuration $(buildConfiguration) \
          --no-build \
          --logger "trx"
      displayName: Run Oracle Tests

  # ---------------- COSMOS (HEAVY ISOLATED JOB) ----------------
  - job: cosmos_tests
    displayName: Cosmos DB Tests
    dependsOn: unit_tests
    timeoutInMinutes: 30
    steps:
    - download: current
      artifact: drop

    - script: |
        set -euo pipefail
        dotnet test Franz.Common.AzureCosmosDB.Tests.csproj\
          --configuration $(buildConfiguration) \
          --no-build \
          --logger "trx" \
          --blame-hang-timeout 10m
      displayName: Run Cosmos Tests


# ------------------------------------------------------------
# PACKAGING STAGE
# ------------------------------------------------------------
- stage: Package
  displayName: Package
  dependsOn: Tests
  condition: succeeded()

  jobs:
  - job: pack
    steps:
    - download: current
      artifact: drop

    - script: |
        set -euo pipefail
        dotnet pack --configuration $(buildConfiguration) --no-build --output $(outputDir)
      displayName: Pack NuGet

    - task: NuGetAuthenticate@1

    - script: |
        set -euo pipefail
        dotnet nuget push "$(outputDir)/*.nupkg" \
          --source "https://pkgs.dev.azure.com/$(azureOrg)/_packaging/$(feedName)/nuget/V3/index.json" \
          --api-key $(System.AccessToken) \
          --skip-duplicate
      displayName: Publish NuGet


# ------------------------------------------------------------
# GIT SYNC (separated from build/test pressure)
# ------------------------------------------------------------
- stage: Sync
  displayName: Sync Repos
  dependsOn: Package
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  jobs:
  - job: github_sync
    steps:

    - checkout: self
      persistCredentials: true
      fetchDepth: 0

    - script: |
        set -euo pipefail
        git remote add github "https://$(GITHUB_USER):$(GITHUB_TOKEN)@github.com/bestacio89/Franz.Common.git" || true
        git push --force github origin/Develop:refs/heads/develop
      displayName: Sync Develop

    - script: |
        set -euo pipefail
        git remote add github "https://$(GITHUB_USER):$(GITHUB_TOKEN)@github.com/bestacio89/Franz.Common.git" || true
        git push --force github origin/main:refs/heads/main
        git fetch --tags --force

        LATEST_TAG=$(git describe --tags --abbrev=0 || true)
        if [ -n "$LATEST_TAG" ]; then
          git push github "$LATEST_TAG"
        fi
      displayName: Sync Main + Tags