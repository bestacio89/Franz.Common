trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-24.04'

variables:
- group: 'Secrets and variables'
- name: buildConfiguration
  value: 'Release'
- name: projectName
  value: 'Franz.Common'
- name: outputDir
  value: '$(Build.ArtifactStagingDirectory)/packages'
- name: azureOrg
  value: 'EntelekheiaSystems'
- name: feedName
  value: 'AjnaTellus'

steps:
- checkout: self
  persistCredentials: true
  fetchDepth: 0

- task: NuGetAuthenticate@1
  displayName: 'Authenticate Azure Artifacts'

- task: UseDotNet@2
  displayName: 'Use .NET SDK 10.x'
  inputs:
    packageType: 'sdk'
    version: '10.0.200'

- script: |
    set -euo pipefail
    dotnet restore
  displayName: 'Restore'

- script: |
    set -euo pipefail
    dotnet build --configuration $(buildConfiguration) --no-restore
  displayName: 'Build'

# ------------------------------------------------------------
# Hardened Infrastructure Cleanup (Prevents Disk Exhaustion)
# ------------------------------------------------------------
- script: |
    set -euo pipefail
    echo "##[section]Reclaiming Disk Space"
    docker system prune -a -f --volumes
    find . -type d -name "TestResults" -exec rm -rf {} +
    df -h
  displayName: 'Infrastructure Cleanup: Disk Reclamation'

# ------------------------------------------------------------
# Hardened Test Execution
# ------------------------------------------------------------
- script: |
    set -euo pipefail
    
    # Limit GC for CI agents to prevent OOM kills
    export DOTNET_GCHeapHardLimitPercent=20
    
    dotnet test \
      --configuration $(buildConfiguration) \
      --no-build \
      --logger "trx" \
      --filter "SkipInCI!=true" \
      --blame-crash \
      --blame-hang-timeout 10m \
      -- RunConfiguration.DisableParallelization=false
  displayName: 'Test (Hardened & Optimized)'

- script: |
    set -euo pipefail
    dotnet pack --configuration $(buildConfiguration) --no-build --output $(outputDir)
  displayName: 'Pack'

- script: |
    set -euo pipefail
    dotnet nuget push "$(outputDir)/*.nupkg" \
      --source "https://pkgs.dev.azure.com/$(azureOrg)/_packaging/$(feedName)/nuget/V3/index.json" \
      --api-key $(System.AccessToken) \
      --skip-duplicate
  displayName: 'Publish to Azure Feed'
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

# ------------------------------------------------------------
# Git Synchronization
# ------------------------------------------------------------
- script: |
    set -euo pipefail
    git remote add github "https://$(GITHUB_USER):$(GITHUB_TOKEN)@github.com/bestacio89/Franz.Common.git" || true
    git push --force github origin/Develop:refs/heads/develop
  displayName: 'Sync GitHub: Develop'
  env:
    GITHUB_USER: $(GITHUB_USER)
    GITHUB_TOKEN: $(GITHUB_TOKEN)

- script: |
    set -euo pipefail
    git remote add github "https://$(GITHUB_USER):$(GITHUB_TOKEN)@github.com/bestacio89/Franz.Common.git" || true
    git push --force github origin/main:refs/heads/main
    git fetch --tags --force
    LATEST_TAG=$(git describe --tags --exact-match 2>/dev/null || git describe --tags --abbrev=0 || true)
    if [ -n "$LATEST_TAG" ]; then git push github "$LATEST_TAG"; fi
  displayName: 'Sync GitHub: Main + Tags'
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  env:
    GITHUB_USER: $(GITHUB_USER)
    GITHUB_TOKEN: $(GITHUB_TOKEN)