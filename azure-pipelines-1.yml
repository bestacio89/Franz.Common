trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-24.04'

variables:
- group: 'Secrets and variables'
- name: buildConfiguration
  value: 'Release'
- name: outputDir
  value: '$(Build.ArtifactStagingDirectory)/packages'
- name: azureOrg
  value: 'EntelekheiaSystems'
- name: feedName
  value: 'AjnaTellus'

stages:

# ============================================================
# BUILD — single restore + build, publish binaries as artifact
# ============================================================
- stage: Build
  displayName: Build

  jobs:
  - job: build
    displayName: Build Solution

    steps:
    - checkout: self
      fetchDepth: 0
      persistCredentials: true

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - task: NuGetAuthenticate@1

    - script: |
        set -euo pipefail
        dotnet restore
      displayName: Restore

    - script: |
        set -euo pipefail
        dotnet build --configuration $(buildConfiguration) --no-restore
      displayName: Build

    # Publish the entire repo + build outputs so test jobs never rebuild
    - publish: $(System.DefaultWorkingDirectory)
      artifact: built-sources
      displayName: Publish built sources


# ============================================================
# TESTS — all jobs download the same artifact, run in parallel
# ============================================================
- stage: Tests
  displayName: Tests
  dependsOn: Build

  jobs:

  # Shared step template anchor — keeps each job DRY
  # Each job downloads the pre-built artifact and runs its test project.
  # No checkout, no restore, no rebuild.

  # ---------------- CORE ----------------
  - job: unit_tests
    displayName: Unit Tests (Fast Gate)
    steps:
    - download: current
      artifact: built-sources
      displayName: Download built sources

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - script: |
        set -euo pipefail
        dotnet test $(Pipeline.Workspace)/built-sources/tests/*/Franz.Common.Business.Tests.csproj \
          --configuration $(buildConfiguration) \
          --no-build \
          --logger trx
      displayName: Run Unit Tests

  # ---------------- PARALLEL BATCH (all independent of each other) ----------------
  # These all depend on unit_tests passing first, then run concurrently.

  - job: cache_tests
    displayName: Cache Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: built-sources
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'
    - script: |
        set -euo pipefail
        dotnet test $(Pipeline.Workspace)/built-sources/tests/*/Franz.Common.Caching.Tests.csproj \
          --configuration $(buildConfiguration) --no-build --logger trx
      displayName: Cache Tests

  - job: mapping_tests
    displayName: Mapping Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: built-sources
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'
    - script: |
        set -euo pipefail
        dotnet test $(Pipeline.Workspace)/built-sources/tests/*/Franz.Common.Mapping.Tests.csproj \
          --configuration $(buildConfiguration) --no-build --logger trx
      displayName: Mapping Tests

  - job: messaging_core
    displayName: Messaging Core Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: built-sources
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'
    - script: |
        set -euo pipefail
        dotnet test $(Pipeline.Workspace)/built-sources/tests/*/Franz.Common.Messaging.Tests.csproj \
          --configuration $(buildConfiguration) --no-build --logger trx
      displayName: Messaging Core Tests

  - job: kafka_tests
    displayName: Kafka Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: built-sources
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'
    - script: |
        set -euo pipefail
        dotnet test $(Pipeline.Workspace)/built-sources/tests/*/Franz.Common.Messaging.Kafka.Tests.csproj \
          --configuration $(buildConfiguration) --no-build --logger trx
      displayName: Kafka Tests

  - job: rabbitmq_tests
    displayName: RabbitMQ Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: built-sources
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'
    - script: |
        set -euo pipefail
        dotnet test $(Pipeline.Workspace)/built-sources/tests/*/Franz.Common.Messaging.RabbitMQ.Tests.csproj \
          --configuration $(buildConfiguration) --no-build --logger trx
      displayName: RabbitMQ Tests

  - job: kafka_hosting_tests
    displayName: Kafka Hosting Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: built-sources
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'
    - script: |
        set -euo pipefail
        dotnet test $(Pipeline.Workspace)/built-sources/tests/*/Franz.Common.Messaging.Hosting.Kafka.Tests.csproj \
          --configuration $(buildConfiguration) --no-build --logger trx
      displayName: Kafka Hosting Tests

  - job: rabbitmq_hosting_tests
    displayName: RabbitMQ Hosting Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: built-sources
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'
    - script: |
        set -euo pipefail
        dotnet test $(Pipeline.Workspace)/built-sources/tests/*/Franz.Common.Messaging.Hosting.RabbitMQ.Tests.csproj \
          --configuration $(buildConfiguration) --no-build --logger trx
      displayName: RabbitMQ Hosting Tests

  - job: ef_sqlserver
    displayName: SQLServer Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: built-sources
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'
    - script: |
        set -euo pipefail
        dotnet test $(Pipeline.Workspace)/built-sources/tests/*/Franz.Common.EntityFramework.SQLServer.Tests.csproj \
          --configuration $(buildConfiguration) --no-build --logger trx
      displayName: SQLServer Tests

  - job: ef_postgres
    displayName: Postgres Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: built-sources
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'
    - script: |
        set -euo pipefail
        dotnet test $(Pipeline.Workspace)/built-sources/tests/*/Franz.Common.EntityFramework.Postgres.Tests.csproj \
          --configuration $(buildConfiguration) --no-build --logger trx
      displayName: Postgres Tests

  - job: ef_oracle
    displayName: Oracle Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: built-sources
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'
    - script: |
        set -euo pipefail
        dotnet test $(Pipeline.Workspace)/built-sources/tests/*/Franz.Common.EntityFramework.Oracle.Tests.csproj \
          --configuration $(buildConfiguration) --no-build --logger trx
      displayName: Oracle Tests

  - job: cosmos_tests
    displayName: Cosmos Tests
    dependsOn: unit_tests
    timeoutInMinutes: 30
    steps:
    - download: current
      artifact: built-sources
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'
    - script: |
        set -euo pipefail
        dotnet test $(Pipeline.Workspace)/built-sources/tests/*/Franz.Common.AzureCosmosDB.Tests.csproj \
          --configuration $(buildConfiguration) --no-build --logger trx \
          --blame-hang-timeout 10m
      displayName: Cosmos Tests


# ============================================================
# PACKAGE — downloads validated build artifact and publishes NuGet
# ============================================================
- stage: Package
  displayName: Package
  dependsOn: Tests
  condition: succeeded()

  jobs:
  - job: pack
    displayName: Pack and Publish NuGet

    steps:
    # ------------------------------------------------------------
    # 1. Download build artifact
    # ------------------------------------------------------------
    - download: current
      artifact: built-sources
      displayName: Download build artifact

    # ------------------------------------------------------------
    # 2. Install .NET SDK
    # ------------------------------------------------------------
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    # ------------------------------------------------------------
    # 3. Authenticate Azure Artifacts feed
    # ------------------------------------------------------------
    - task: NuGetAuthenticate@1

    # ------------------------------------------------------------
    # 4. RESTORE (required for dotnet pack correctness)
    # ------------------------------------------------------------
    - script: |
        set -euo pipefail

        echo "Restoring dependencies for packaging..."

        dotnet restore $(Pipeline.Workspace)/built-sources/sources \
          --disable-parallel

      displayName: Restore for Packaging

    # ------------------------------------------------------------
    # 5. PACK
    # ------------------------------------------------------------
    - script: |
        set -euo pipefail

        dotnet pack $(Pipeline.Workspace)/built-sources/sources \
          --configuration $(buildConfiguration) \
          --no-build \
          --output $(outputDir)

      displayName: Pack NuGet

    # ------------------------------------------------------------
    # 6. PUBLISH (CORRECT Azure Artifacts method)
    # ------------------------------------------------------------
    - task: NuGetCommand@2
      displayName: Publish NuGet
      inputs:
        command: push
        packagesToPush: '$(outputDir)/*.nupkg'
        publishVstsFeed: 'AjnaTellus'


# ============================================================
# SYNC
# ============================================================
- stage: Sync
  displayName: Sync Repos
  dependsOn: Package
  condition: succeeded()

  jobs:
  - job: github_sync
    displayName: Sync to GitHub

    steps:
    - checkout: self
      fetchDepth: 0
      persistCredentials: true

    - script: |
        set -euo pipefail
        git remote add github "https://$(GITHUB_USER):$(GITHUB_TOKEN)@github.com/bestacio89/Franz.Common.git" || true
        git push --force github origin/main:refs/heads/main
        git push --force github origin/develop:refs/heads/develop
      displayName: Sync main and develop