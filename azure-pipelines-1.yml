trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-24.04'

variables:
- group: 'Secrets and variables'

- name: buildConfiguration
  value: 'Release'

- name: projectName
  value: 'Franz.Common'

- name: outputDir
  value: '$(Build.ArtifactStagingDirectory)/packages'

- name: azureOrg
  value: 'EntelekheiaSystems'

- name: feedName
  value: 'AjnaTellus'

steps:

# ------------------------------------------------------------
# Checkout (full history required for tags + sync integrity)
# ------------------------------------------------------------

- checkout: self
  persistCredentials: true
  fetchDepth: 0

# ------------------------------------------------------------
# Auth + SDK
# ------------------------------------------------------------

- task: NuGetAuthenticate@1
  displayName: 'Authenticate Azure Artifacts'

- task: UseDotNet@2
  displayName: 'Use .NET SDK 10.x'
  inputs:
    packageType: 'sdk'
    version: '10.0.200'

# ------------------------------------------------------------
# Restore
# ------------------------------------------------------------

- script: |
    set -euo pipefail
    dotnet restore
  displayName: 'Restore'

# ------------------------------------------------------------
# Build
# ------------------------------------------------------------

- script: |
    set -euo pipefail
    dotnet build \
      --configuration $(buildConfiguration) \
      --no-restore
  displayName: 'Build'

# ------------------------------------------------------------
# Test
# Excludes local-only Cosmos emulator tests
# ------------------------------------------------------------

- script: |
    set -euo pipefail

    dotnet test \
      --configuration $(buildConfiguration) \
      --no-build \
      --logger trx \
      --filter "SkipInCI!=true"

  displayName: 'Test (Exclude Local-Only Cosmos Tests)'

# ------------------------------------------------------------
# Pack
# ------------------------------------------------------------

- script: |
    set -euo pipefail

    dotnet pack \
      --configuration $(buildConfiguration) \
      --no-build \
      --output $(outputDir)

  displayName: 'Pack'

# ------------------------------------------------------------
# Publish to Azure Artifacts
# ------------------------------------------------------------

- script: |
    set -euo pipefail

    dotnet nuget push "$(outputDir)/*.nupkg" \
      --source "https://pkgs.dev.azure.com/$(azureOrg)/_packaging/$(feedName)/nuget/V3/index.json" \
      --api-key $(System.AccessToken) \
      --skip-duplicate

  displayName: 'Publish to Azure Feed'

  condition: and(
    succeeded(),
    eq(variables['Build.SourceBranch'], 'refs/heads/main')
    )

# ------------------------------------------------------------
# Sync GitHub Develop
# ------------------------------------------------------------

- script: |
    set -euo pipefail

    git remote add github \
      "https://$(GITHUB_USER):$(GITHUB_TOKEN)@github.com/bestacio89/Franz.Common.git" \
      || git remote set-url github \
      "https://$(GITHUB_USER):$(GITHUB_TOKEN)@github.com/bestacio89/Franz.Common.git"

    git push --force github origin/Develop:refs/heads/develop

  displayName: 'Sync GitHub: Develop'

  env:
    GITHUB_USER: $(GITHUB_USER)
    GITHUB_TOKEN: $(GITHUB_TOKEN)

# ------------------------------------------------------------
# Sync GitHub Main + Tags
# ------------------------------------------------------------

- script: |
    set -euo pipefail

    git remote add github \
      "https://$(GITHUB_USER):$(GITHUB_TOKEN)@github.com/bestacio89/Franz.Common.git" \
      || git remote set-url github \
      "https://$(GITHUB_USER):$(GITHUB_TOKEN)@github.com/bestacio89/Franz.Common.git"

    git push --force github origin/main:refs/heads/main

    git fetch --tags --force

    LATEST_TAG=$(git describe --tags --exact-match 2>/dev/null || \
                 git describe --tags --abbrev=0 || true)

    if [ -n "$LATEST_TAG" ]; then
      git push github "$LATEST_TAG"
    fi

  displayName: 'Sync GitHub: Main + Tags'

  condition: and(
    succeeded(),
    eq(variables['Build.SourceBranch'], 'refs/heads/main')
    )

  env:
    GITHUB_USER: $(GITHUB_USER)
    GITHUB_TOKEN: $(GITHUB_TOKEN)