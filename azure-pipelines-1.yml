trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-24.04'

variables:
- group: 'Secrets and variables'
- name: buildConfiguration
  value: 'Release'
- name: outputDir
  value: '$(Build.ArtifactStagingDirectory)/packages'
- name: azureOrg
  value: 'EntelekheiaSystems'
- name: feedName
  value: 'AjnaTellus'

stages:

# ============================================================
# BUILD — single restore + build, publish binaries as artifact
# ============================================================
- stage: Build
  displayName: Build

  jobs:
  - job: build
    displayName: Build Solution

    steps:
    - checkout: self
      fetchDepth: 0
      persistCredentials: true

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - task: NuGetAuthenticate@1

    - script: |
        set -euo pipefail
        dotnet restore
      displayName: Restore

    - script: |
        set -euo pipefail
        dotnet build --configuration $(buildConfiguration) --no-restore
      displayName: Build

    - publish: $(System.DefaultWorkingDirectory)
      artifact: built-sources
      displayName: Publish built sources


# ============================================================
# TESTS — all jobs download the same artifact, run in parallel
# ============================================================
- stage: Tests
  displayName: Tests
  dependsOn: Build

  jobs:

  # ---------------- CORE ----------------
  - job: unit_tests
    displayName: Unit Tests (Fast Gate)
    steps:
    - download: current
      artifact: built-sources
      displayName: Download built sources

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - script: |
        set -euo pipefail
        dotnet test $(Pipeline.Workspace)/built-sources/tests/*/Franz.Common.Business.Tests.csproj \
          --configuration $(buildConfiguration) \
          --no-build \
          --logger trx
      displayName: Run Unit Tests

  # ---------------- PARALLEL BATCH ----------------
  - job: Mediator_Tests
    displayName: Mediator Tests
    dependsOn: unit_tests
    steps:
    - download: current
      artifact: built-sources
    - task: UseDotNet@2
      inputs:
        packagetype: sdk
        version: '10.0.200'
    - script: |
        set -euo pipefail
        dotnet test $(Pipeline.Workspace)/built-sources/tests/*/Franz.Common.Mediator.Tests.csproj \
          --configuration $(buildConfiguration) --no-build --logger trx
      displayName: Mediator Tests 


