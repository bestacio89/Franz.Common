      displayName: Cosmos Tests


# ============================================================
# PACKAGE — PowerShell@2 invokes .ps1 correctly on Linux runners
# ============================================================
- stage: Package
  displayName: Package
  dependsOn: Tests
  condition: succeeded()

  jobs:
  - job: pack
    displayName: Pack and Publish
    steps:
    # Fresh checkout — reliable source of truth for publishing.
    # Artifacts don't guarantee complete capture; repo checkout does.
    - checkout: self
      fetchDepth: 0
      persistCredentials: true

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - task: NuGetAuthenticate@1

    - script: |
        set -euo pipefail
        dotnet restore
      displayName: Restore

    - script: |
        set -euo pipefail
        dotnet build --configuration $(buildConfiguration) --no-restore
      displayName: Build

    - script: |
        set -euo pipefail
        dotnet pack           --configuration $(buildConfiguration)           --no-restore           --no-build           --output $(outputDir)
      displayName: Pack NuGet

    # PowerShell@2 uses pwsh on Linux — correct runtime for .ps1 files.
    # Scripts are at repo root, resolved from the checkout workspace.

    - task: PowerShell@2
      displayName: Publish to Franz Artifact
      inputs:
          filePath: '$(System.DefaultWorkingDirectory)/FranzArtifactPublisher.ps1'
          arguments: '-PackagesDirectory "$(outputDir)"'
          pwsh: true
    
    - task: PowerShell@2
      displayName: Publish to NuGet.org
      inputs:
        filePath: '$(System.DefaultWorkingDirectory)/nugetpublish.ps1'
        arguments: '-PackagesDirectory "$(outputDir)"'
        pwsh: true
      env:
        NUGET_API_KEY: $(API_Key)


# ============================================================
# SYNC
# ============================================================
- stage: Sync
  displayName: Sync Repos
  dependsOn: Package
  condition: succeeded()

  jobs:
  - job: github_sync
    displayName: Sync to GitHub

    steps:
    - checkout: self
      fetchDepth: 0
      persistCredentials: true

    - script: |
        set -euo pipefail
        git remote add github "https://$(GITHUB_USER):$(GITHUB_TOKEN)@github.com/bestacio89/Franz.Common.git" || true
        git push --force github origin/main:refs/heads/main
        git push --force github origin/Develop:refs/heads/develop
      displayName: Sync main and develop