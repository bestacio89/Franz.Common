trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-24.04'

variables:
- group: 'Secrets and variables'
- name: buildConfiguration
  value: 'Release'
- name: outputDir
  value: '$(Build.ArtifactStagingDirectory)/packages'
- name: azureOrg
  value: 'EntelekheiaSystems'
- name: feedName
  value: 'AjnaTellus'

stages:

# ============================================================
# BUILD (single source of truth)
# ============================================================
- stage: Build
  displayName: Build

  jobs:
  - job: build
    displayName: Build Solution

    steps:
    - checkout: self
      fetchDepth: 0
      persistCredentials: true

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - task: NuGetAuthenticate@1

    - script: |
        set -euo pipefail
        dotnet restore
      displayName: Restore

    - script: |
        set -euo pipefail
        dotnet build --configuration $(buildConfiguration) --no-restore
      displayName: Build


# ============================================================
# TESTS 
# ============================================================
- stage: Tests
  displayName: Tests
  dependsOn: Build

  jobs:

  # ---------------- CORE ----------------
  - job: unit_tests
    displayName: Unit Tests (Fast Gate)
    steps:
    - checkout: self

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - script: |
        set -euo pipefail
        dotnet test tests/*/Franz.Common.Business.Tests.csproj \
          --configuration $(buildConfiguration) \
          --logger trx
      displayName: Run Unit Tests

  # ---------------- CACHE ----------------
  - job: cache_tests
    dependsOn: unit_tests
    steps:
    - checkout: self

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - script: |
        set -euo pipefail
        dotnet test tests/*/Franz.Common.Caching.Tests.csproj \
          --configuration $(buildConfiguration) \
          --logger trx
      displayName: Cache Tests

  # ---------------- MAPPING ----------------
  - job: mapping_tests
    dependsOn: unit_tests
    steps:
    - checkout: self

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - script: |
        set -euo pipefail
        dotnet test tests/*/Franz.Common.Mapping.Tests.csproj \
          --configuration $(buildConfiguration) \
          --logger trx
      displayName: Mapping Tests

  # ---------------- MESSAGING CORE ----------------
  - job: messaging_core
    dependsOn: unit_tests
    steps:
    - checkout: self

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - script: |
        set -euo pipefail
        dotnet test tests/*/Franz.Common.Messaging.Tests.csproj \
          --configuration $(buildConfiguration) \
          --logger trx
      displayName: Messaging Core Tests

  # ---------------- KAFKA ----------------
  - job: kafka_tests
    dependsOn: unit_tests
    steps:
    - checkout: self

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - script: |
        set -euo pipefail
        dotnet test tests/*/Franz.Common.Messaging.Kafka.Tests.csproj \
          --configuration $(buildConfiguration) \
          --logger trx
      displayName: Kafka Tests

  # ---------------- RABBITMQ ----------------
  - job: rabbitmq_tests
    dependsOn: unit_tests
    steps:
    - checkout: self

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - script: |
        set -euo pipefail
        dotnet test tests/*/Franz.Common.Messaging.RabbitMQ.Tests.csproj \
          --configuration $(buildConfiguration) \
          --logger trx
      displayName: RabbitMQ Tests

  # ---------------- HOSTING KAFKA ----------------
  - job: kafka_hosting_tests
    dependsOn: unit_tests
    steps:
    - checkout: self

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - script: |
        set -euo pipefail
        dotnet test tests/*/Franz.Common.Messaging.Hosting.Kafka.Tests.csproj \
          --configuration $(buildConfiguration) \
          --logger trx
      displayName: Kafka Hosting Tests

  # ---------------- HOSTING RABBITMQ ----------------
  - job: rabbitmq_hosting_tests
    dependsOn: unit_tests
    steps:
    - checkout: self

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - script: |
        set -euo pipefail
        dotnet test tests/*/Franz.Common.Messaging.Hosting.RabbitMQ.Tests.csproj \
          --configuration $(buildConfiguration) \
          --logger trx
      displayName: RabbitMQ Hosting Tests

  # ---------------- EF SQLSERVER ----------------
  - job: ef_sqlserver
    dependsOn: unit_tests
    steps:
    - checkout: self

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - script: |
        set -euo pipefail
        dotnet test tests/*/Franz.Common.EntityFramework.SQLServer.Tests.csproj \
          --configuration $(buildConfiguration) \
          --logger trx
      displayName: SQLServer Tests

  # ---------------- EF POSTGRES ----------------
  - job: ef_postgres
    dependsOn: unit_tests
    steps:
    - checkout: self

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - script: |
        set -euo pipefail
        dotnet test tests/*/Franz.Common.EntityFramework.Postgres.Tests.csproj \
          --configuration $(buildConfiguration) \
          --logger trx
      displayName: Postgres Tests

  # ---------------- EF ORACLE ----------------
  - job: ef_oracle
    dependsOn: unit_tests
    steps:
    - checkout: self

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - script: |
        set -euo pipefail
        dotnet test tests/*/Franz.Common.EntityFramework.Oracle.Tests.csproj \
          --configuration $(buildConfiguration) \
          --logger trx
      displayName: Oracle Tests

  # ---------------- COSMOS ----------------
  - job: cosmos_tests
    dependsOn: unit_tests
    timeoutInMinutes: 30
    steps:
    - checkout: self

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - script: |
        set -euo pipefail
        dotnet test tests/*/Franz.Common.AzureCosmosDB.Tests.csproj \
          --configuration $(buildConfiguration) \
          --logger trx \
          --blame-hang-timeout 10m
      displayName: Cosmos Tests


# ============================================================
# PACKAGE
# ============================================================
- stage: Package
  displayName: Package
  dependsOn: Tests
  condition: succeeded()

  jobs:
  - job: pack
    steps:

    - checkout: self
      fetchDepth: 0

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.0.200'

    - task: NuGetAuthenticate@1

    # CRITICAL FIX: restore solution BEFORE pack
    - script: |
        set -euo pipefail
        dotnet restore
      displayName: Restore (required for pack)

    - script: |
        set -euo pipefail
        dotnet pack \
          --configuration $(buildConfiguration) \
          --no-restore \
          --output $(outputDir)
      displayName: Pack NuGet

    - script: |
        set -euo pipefail
        dotnet nuget push "$(outputDir)/*.nupkg" \
          --source "https://pkgs.dev.azure.com/$(azureOrg)/_packaging/$(feedName)/nuget/V3/index.json" \
          --api-key $(System.AccessToken) \
          --skip-duplicate
      displayName: Publish NuGet


# ============================================================
# SYNC
# ============================================================
- stage: Sync
  displayName: Sync Repos
  dependsOn: Package
  condition: succeeded()

  jobs:
  - job: github_sync
    steps:

    - checkout: self
      fetchDepth: 0
      persistCredentials: true

    - script: |
        set -euo pipefail
        git remote add github "https://$(GITHUB_USER):$(GITHUB_TOKEN)@github.com/bestacio89/Franz.Common.git" || true
        git push --force github origin/main:refs/heads/main
      displayName: Sync Main