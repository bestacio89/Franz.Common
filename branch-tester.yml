trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  FocusedFilter: 'FullyQualifiedName~Messaging.Kafka'

steps:
- checkout: self
  persistCredentials: 'true'
  fetchDepth: '0'

- task: UseDotNet@2
  displayName: 'Install .NET 10 SDK'
  inputs:
    packageType: 'sdk'
    version: '10.0.x'
    includePreviewVersions: true

- task: NuGetAuthenticate@1
  displayName: 'Authenticate to Azure Artifacts'

- script: dotnet restore
  displayName: 'Restore NuGet packages'

- script: dotnet build --configuration $(buildConfiguration) --no-restore
  displayName: 'Build solution'

# Test - Surgical Strike on Core Kafka Messaging
# Using raw script instead of DotNetCoreCLI@2 so that --blame-hang and
# --blame-hang-timeout are passed directly to the dotnet CLI rather than
# being proxied through MSBuild's VSTest target, which rejects them.
- script: |
    dotnet test tests/Franz.Common.Messaging.Kafka.Tests/Franz.Common.Messaging.Kafka.Tests.csproj \
      --configuration $(buildConfiguration) \
      --no-build \
      --filter "$(FocusedFilter)" \
      --logger "trx;LogFileName=test_results.trx" \
      --results-directory $(Agent.TempDirectory) \
      --verbosity normal \
      --blame-hang \
      --blame-hang-timeout 60s
  displayName: 'Run Core Kafka Messaging Hosting Tests'

# Publish results separately with condition: always() so the TRX is
# uploaded even when the test run hangs or exits with a non-zero code.
- task: PublishTestResults@2
  displayName: 'Publish Test Results'
  condition: always()
  inputs:
    testResultsFormat: 'VSTest'
    testResultsFiles: '$(Agent.TempDirectory)/*.trx'